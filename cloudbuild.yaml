# Build -> push -> deploy. No top-level "images:" (avoids pushing twice = fewer API mutate calls / quota).
steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/bilsnapper/bilsnapper-scanner:latest'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'us-west1-docker.pkg.dev/$PROJECT_ID/bilsnapper/bilsnapper-scanner:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - bilsnapper-scanner
      - '--image=us-west1-docker.pkg.dev/$PROJECT_ID/bilsnapper/bilsnapper-scanner:latest'
      - '--region=us-west1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--timeout=3600'
      - '--concurrency=1'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_DATABASE_ID=ai-studio-724f6025-f227-47f5-978b-3fcd3f2803d3,LOCAL_CRON=false'

options:
  logging: CLOUD_LOGGING_ONLY
