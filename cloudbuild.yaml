steps:
  # Bygg Docker-image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - '-t'
      - 'gcr.io/$PROJECT_ID/bilsnapper-scanner:latest'
      - '.'

  # Push til Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/bilsnapper-scanner:latest'

  # Deploy til Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - bilsnapper-scanner
      - '--image=gcr.io/$PROJECT_ID/bilsnapper-scanner:latest'
      - '--region=us-west1'
      - '--platform=managed'
      - '--no-allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=1'
      - '--timeout=3600'
      - '--concurrency=1'
      - '--min-instances=0'
      - '--max-instances=1'
      - '--set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,FIRESTORE_DATABASE_ID=ai-studio-724f6025-f227-47f5-978b-3fcd3f2803d3,LOCAL_CRON=false'

images:
  - 'gcr.io/$PROJECT_ID/bilsnapper-scanner:latest'

options:
  logging: CLOUD_LOGGING_ONLY
